<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>Loot.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:'Inter',-apple-system,sans-serif;display:flex;justify-content:center;padding:20px 12px 40px;min-height:100vh;-webkit-font-smoothing:antialiased}
.phone{width:393px;background:#F7F5F2;border-radius:50px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,.55)}
.island{width:120px;height:34px;background:#111;border-radius:0 0 22px 22px;margin:0 auto}
.status{display:flex;justify-content:space-between;padding:8px 26px 0;font-size:12px;font-weight:500;color:#555}
.scroll{height:808px;overflow-y:auto;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.header{padding:18px 20px 14px;display:flex;align-items:center;justify-content:space-between}
.title{font-size:20px;font-weight:800;color:#1C1917;letter-spacing:-0.3px}
.search-wrap{position:relative;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.badge{position:absolute;top:0;right:0;background:#2ECC71;border-radius:10px;padding:1px 5px;min-width:22px;text-align:center;font-size:9px;font-weight:800;color:#fff}
.filters{display:flex;gap:8px;padding:0 16px 14px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.pill{padding:8px 18px;border-radius:50px;background:#EEEBE6;font-size:13px;font-weight:600;color:#78716C;cursor:pointer;white-space:nowrap;border:none;font-family:'Inter',sans-serif;transition:all .15s}
.pill.active{background:#1C1917;color:#fff}
.card{background:#fff;border-radius:16px;margin:0 16px 10px;display:flex;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.04)}
.card-img{width:130px;height:130px;flex-shrink:0;background:#F5F3EF;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;align-self:flex-start}
.card-img img{width:100%;height:100%;object-fit:cover;object-position:top left;display:block}
.placeholder{font-size:32px}
.card-body{flex:1;padding:14px;display:flex;flex-direction:column;gap:6px}
.copy{font-size:13.5px;line-height:1.5;color:#1C1917;font-weight:500;flex:1}
.clicks{font-size:11px;color:#A8A29E;font-weight:500}
.actions{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.offer-btn{background:#F5F3EF;border:none;border-radius:50px;padding:8px 16px;font-size:12.5px;font-weight:600;color:#1C1917;font-family:'Inter',sans-serif;cursor:pointer}
.offer-btn:hover{background:#EAE7E2}
.bookmark{font-size:16px;opacity:.35;cursor:pointer;background:none;border:none;padding:4px}
.loading{text-align:center;padding:60px 20px;color:#A8A29E;font-size:14px}
.empty{text-align:center;padding:60px 20px;color:#A8A29E;font-size:14px}
</style>
</head>
<body>
<div class="phone">
  <div class="island"></div>
  <div class="status"><span>9:41</span><span>●●● 5G</span></div>
  <div class="scroll">
    <div class="header">
      <span class="title">Fresh deals, right now 🔥</span>
      <div class="search-wrap">🔍<div class="badge" id="badge" style="display:none"></div></div>
    </div>
    <div class="filters">
      <button class="pill active" onclick="filter(this,'all')">All</button>
      <button class="pill" onclick="filter(this,'fashion')">Fashion</button>
      <button class="pill" onclick="filter(this,'electronics')">Electronics</button>
      <button class="pill" onclick="filter(this,'footwear')">Footwear</button>
      <button class="pill" onclick="filter(this,'under999')">Under ₹999</button>
    </div>
    <div id="list"><div class="loading">Loading deals...</div></div>
  </div>
</div>

<script>
const API = 'https://loot-api.fly.dev';
let allDeals = [];
let active = 'all';

const FASHION_PLATFORMS = ['myntra','ajio','meesho','nykaa'];
const ELECTRONICS_PLATFORMS = ['amazon','flipkart','zepto','blinkit'];

async function loadDeals() {
  try {
    const res = await fetch(API + '/deals');
    const data = await res.json();
    allDeals = data.deals || [];
    const badge = document.getElementById('badge');
    badge.style.display = 'block';
    badge.textContent = allDeals.length + '+';
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="loading">Could not load deals.</div>';
  }
}

function filter(el, cat) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  active = cat;
  render();
}

function render() {
  const filtered = allDeals.filter(d => {
    if (active === 'all') return true;
    if (active === 'under999') {
      const p = (d.deal_price || '').replace(/[^\d]/g,'');
      return p && parseInt(p) < 999;
    }
    if (active === 'fashion') return FASHION_PLATFORMS.includes(d.platform);
    if (active === 'electronics') return ELECTRONICS_PLATFORMS.includes(d.platform);
    if (active === 'footwear') return ['myntra','ajio'].includes(d.platform);
    return true;
  });

  if (!filtered.length) {
    document.getElementById('list').innerHTML = '<div class="empty">No deals here yet.</div>';
    return;
  }

  const clicks = n => n >= 1000 ? (n/1000).toFixed(1)+'K' : n;

  document.getElementById('list').innerHTML = filtered.map(d => `
    <div class="card" onclick="window.open('${d.affiliate_url || '#'}','_blank')">
      <div class="card-img">
        ${d.image_url
          ? `<img src="${d.image_url}" loading="lazy"/>`
          : `<span class="placeholder">🛍</span>`}
      </div>
      <div class="card-body">
        <div class="copy">${escHtml(d.copy)}</div>
        <div class="clicks">${clicks(d.clicks || 0)} clicks</div>
        <div class="actions">
          <button class="offer-btn">View Offer →</button>
          <button class="bookmark" onclick="event.stopPropagation()">🔖</button>
        </div>
      </div>
    </div>`).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadDeals();
</script>
</body>
</html>
