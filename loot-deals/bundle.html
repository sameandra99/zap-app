<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1"/>
<title>LOOT — Deal Discovery App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .phone-shell {
    width: 390px;
    min-height: 844px;
    background: #0A0A0F;
    border-radius: 48px;
    overflow: hidden;
    position: relative;
    border: 1.5px solid rgba(255,255,255,0.08);
    box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  .notch {
    width: 126px; height: 34px;
    background: #0A0A0F;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
    border: 1.5px solid rgba(255,255,255,0.06);
    border-top: none;
  }
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px 0;
    color: rgba(255,255,255,0.6);
    font-size: 13px; font-weight: 600;
  }
  .status-icons { display: flex; align-items: center; gap: 6px; font-size: 11px; }

  /* Scrollable content area */
  .content-scroll {
    height: 740px;
    overflow-y: auto;
    overflow-x: hidden;
    padding-bottom: 80px;
    scrollbar-width: none;
  }
  .content-scroll::-webkit-scrollbar { display: none; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px 14px;
  }
  .logo-row { display: flex; align-items: center; gap: 8px; }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #7C3AED, #5B21B6);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .logo-text { font-size: 22px; font-weight: 900; letter-spacing: -0.05em; color: #fff; }
  .logo-text span { color: #7C3AED; }
  .topbar-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px;
  }

  /* Hero strip */
  .hero-strip {
    margin: 0 20px 16px;
    background: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(91,33,182,0.07) 100%);
    border: 1px solid rgba(124,58,237,0.22);
    border-radius: 16px; padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hero-label { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 3px; }
  .hero-value { color: #fff; font-size: 15px; font-weight: 700; }
  .hero-value.green { color: #10B981; }

  /* Filter pills */
  .filters {
    display: flex; gap: 8px;
    padding: 0 20px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .pill {
    flex-shrink: 0;
    padding: 6px 15px;
    border-radius: 20px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.45);
    transition: all 0.15s;
  }
  .pill.active {
    background: linear-gradient(135deg, #7C3AED, #6D28D9);
    border-color: rgba(139,92,246,0.4);
    color: #fff;
    box-shadow: 0 4px 12px rgba(124,58,237,0.3);
  }

  /* Section label */
  .section-label {
    padding: 0 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-label span { color: rgba(255,255,255,0.4); font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .section-label a { color: #7C3AED; font-size: 12px; font-weight: 600; cursor: pointer; }

  /* Deal cards */
  .cards { padding: 0 20px; }
  .deal-card {
    background: linear-gradient(145deg, #13131A 0%, #0F0F18 100%);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; overflow: hidden;
    margin-bottom: 14px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .deal-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  /* Card image */
  .card-img { position: relative; height: 200px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-img-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(10,10,15,0.88) 100%);
  }
  .badge {
    position: absolute; top: 12px; left: 12px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
    padding: 3px 9px; border-radius: 6px; text-transform: uppercase; color: #fff;
  }
  .discount-bubble {
    position: absolute; top: 12px; right: 12px;
    background: rgba(124,58,237,0.92); backdrop-filter: blur(8px);
    border-radius: 12px; padding: 4px 11px;
    border: 1px solid rgba(139,92,246,0.4);
    font-size: 15px; font-weight: 800; color: #fff;
  }
  .brand-tag {
    position: absolute; bottom: 12px; left: 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    padding: 3px 9px; border-radius: 6px;
  }
  .card-actions {
    position: absolute; bottom: 8px; right: 12px;
    display: flex; gap: 8px;
  }
  .card-btn {
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  .card-btn.saved {
    background: rgba(124,58,237,0.85);
    border-color: rgba(139,92,246,0.6);
  }

  /* Card body */
  .card-body { padding: 14px 16px 16px; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .card-meta { flex: 1; }
  .card-tag { font-size: 10px; font-weight: 700; color: #7C3AED; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .card-title { color: #fff; font-size: 16px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; }
  .card-desc { color: rgba(255,255,255,0.38); font-size: 12px; }

  /* Deal score ring */
  .score-ring { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-inner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
  }
  .score-num { font-size: 11px; font-weight: 800; line-height: 1; }
  .score-label { font-size: 7px; color: rgba(255,255,255,0.35); line-height: 1; margin-top: 1px; }

  /* Price row */
  .price-row { display: flex; align-items: center; gap: 10px; margin: 13px 0 12px; }
  .price-main { color: #fff; font-size: 23px; font-weight: 900; letter-spacing: -0.02em; }
  .price-orig { color: rgba(255,255,255,0.28); font-size: 14px; text-decoration: line-through; }
  .time-left {
    margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.33);
    display: flex; align-items: center; gap: 4px;
  }
  .time-dot { color: #EF4444; font-size: 10px; }

  /* Bottom CTA row */
  .cta-row { display: flex; align-items: center; }
  .sold-count { color: rgba(255,255,255,0.22); font-size: 11px; }
  .buy-btn {
    margin-left: auto;
    background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
    border: none; border-radius: 10px;
    color: #fff; font-size: 13px; font-weight: 700;
    padding: 9px 22px; cursor: pointer; letter-spacing: 0.02em;
    box-shadow: 0 4px 16px rgba(124,58,237,0.38);
    transition: transform 0.1s, box-shadow 0.1s;
    font-family: 'Inter', sans-serif;
  }
  .buy-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124,58,237,0.5);
  }
  .buy-btn:active { transform: translateY(0); }

  /* Empty state */
  .empty { text-align: center; padding: 60px 0; color: rgba(255,255,255,0.28); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Bottom nav */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,15,0.96); backdrop-filter: blur(24px);
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex; padding: 10px 0 22px;
    z-index: 50;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; padding: 4px 0;
    font-family: 'Inter', sans-serif;
  }
  .nav-icon { font-size: 19px; opacity: 0.28; transition: opacity 0.15s; }
  .nav-icon.active { opacity: 1; }
  .nav-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.28); letter-spacing: 0.04em; transition: color 0.15s; }
  .nav-label.active { color: #7C3AED; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #7C3AED; box-shadow: 0 0 6px #7C3AED; }

  /* Misc */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-icons">
      <span>●●●</span>
      <span>WiFi</span>
      <span>100%</span>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content-scroll">

    <!-- Top bar -->
    <div class="topbar">
      <div class="logo-row">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">LOOT<span>.</span></div>
      </div>
      <div class="topbar-actions">
        <div class="icon-btn">🔍</div>
        <div class="icon-btn" style="position:relative;">
          🔔
          <span style="position:absolute;top:6px;right:6px;width:7px;height:7px;background:#EF4444;border-radius:50%;border:1.5px solid #0A0A0F;"></span>
        </div>
      </div>
    </div>

    <!-- Hero strip -->
    <div class="hero-strip">
      <div>
        <div class="hero-label">Today's haul</div>
        <div class="hero-value">47 loot deals live ⚡</div>
      </div>
      <div style="text-align:right">
        <div class="hero-label">Avg saving</div>
        <div class="hero-value green">₹1,240</div>
      </div>
    </div>

    <!-- Filter pills -->
    <div class="filters" id="filters">
      <div class="pill active" data-filter="All" onclick="setFilter(this,'All')">All</div>
      <div class="pill" data-filter="Fashion" onclick="setFilter(this,'Fashion')">Fashion</div>
      <div class="pill" data-filter="Beauty" onclick="setFilter(this,'Beauty')">Beauty</div>
      <div class="pill" data-filter="Home" onclick="setFilter(this,'Home')">Home</div>
      <div class="pill" data-filter="Electronics" onclick="setFilter(this,'Electronics')">Electronics</div>
    </div>

    <!-- Section label -->
    <div class="section-label">
      <span id="deal-count">4 deals · AI curated</span>
      <a>Sort ↕</a>
    </div>

    <!-- Deal cards -->
    <div class="cards" id="cards-container"></div>

    <!-- Empty state -->
    <div class="empty hidden" id="empty-state">
      <div class="empty-icon">◈</div>
      <p>No deals in this category right now</p>
    </div>

  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-item" onclick="setNav(this,'home')">
      <span class="nav-icon active">⚡</span>
      <span class="nav-label active">Deals</span>
      <span class="nav-dot"></span>
    </button>
    <button class="nav-item" onclick="setNav(this,'browse')">
      <span class="nav-icon">◈</span>
      <span class="nav-label">Browse</span>
    </button>
    <button class="nav-item" onclick="setNav(this,'saved')">
      <span class="nav-icon">♥</span>
      <span class="nav-label">Saved</span>
    </button>
    <button class="nav-item" onclick="setNav(this,'alerts')">
      <span class="nav-icon">◎</span>
      <span class="nav-label">Alerts</span>
    </button>
  </div>
</div>

<script>
const deals = [
  {
    id: 1,
    brand: "Myntra",
    brandColor: "#FF3F6C",
    category: "Fashion",
    title: "Roadster Oversized Tee",
    description: "100% cotton · 12 colours",
    image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500&h=300&fit=crop",
    originalPrice: 1299,
    dealPrice: 299,
    discount: 77,
    timeLeft: "2h 14m",
    dealScore: 94,
    scoreColor: "#10B981",
    badge: "HOT",
    badgeColor: "#EF4444",
    soldCount: "2.4k bought today",
    tag: "Aaj Ka Loot",
  },
  {
    id: 2,
    brand: "Nykaa",
    brandColor: "#FC2779",
    category: "Beauty",
    title: "Maybelline Fit Me Foundation",
    description: "30ml · SPF 18 · Matte finish",
    image: "https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=500&h=300&fit=crop",
    originalPrice: 799,
    dealPrice: 319,
    discount: 60,
    timeLeft: "45m",
    dealScore: 88,
    scoreColor: "#F59E0B",
    badge: "ENDING SOON",
    badgeColor: "#F59E0B",
    soldCount: "890 bought today",
    tag: "Loot Price",
  },
  {
    id: 3,
    brand: "Amazon",
    brandColor: "#FF9900",
    category: "Home",
    title: "Prestige Induction Cooktop",
    description: "2000W · 8 preset menus",
    image: "https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=500&h=300&fit=crop",
    originalPrice: 3499,
    dealPrice: 1299,
    discount: 63,
    timeLeft: "5h 30m",
    dealScore: 91,
    scoreColor: "#10B981",
    badge: "HOT",
    badgeColor: "#EF4444",
    soldCount: "1.1k bought today",
    tag: "Loot Price",
  },
  {
    id: 4,
    brand: "Flipkart",
    brandColor: "#2874F0",
    category: "Electronics",
    title: "boAt Airdopes 141",
    description: "42hr battery · ENx™ tech",
    image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500&h=300&fit=crop",
    originalPrice: 2990,
    dealPrice: 899,
    discount: 70,
    timeLeft: "1h 05m",
    dealScore: 97,
    scoreColor: "#10B981",
    badge: "ENDING SOON",
    badgeColor: "#F59E0B",
    soldCount: "5.2k bought today",
    tag: "Aaj Ka Loot",
  },
];

const saved = new Set();
let currentFilter = "All";

function fmtPrice(n) {
  return "₹" + n.toLocaleString("en-IN");
}

function scoreRingHTML(score, color) {
  const r = 18, c = 2 * Math.PI * r;
  const offset = c - (score / 100) * c;
  return `
    <div class="score-ring">
      <svg width="48" height="48">
        <circle cx="24" cy="24" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
        <circle cx="24" cy="24" r="${r}" fill="none" stroke="${color}" stroke-width="3"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transform:rotate(-90deg);transform-origin:center"/>
      </svg>
      <div class="score-inner">
        <span class="score-num" style="color:${color}">${score}</span>
        <span class="score-label">AI</span>
      </div>
    </div>`;
}

function cardHTML(d) {
  const isSaved = saved.has(d.id);
  return `
  <div class="deal-card" data-id="${d.id}" data-cat="${d.category}">
    <div class="card-img">
      <img src="${d.image}" alt="${d.title}" loading="lazy"/>
      <div class="card-img-overlay"></div>
      <div class="badge" style="background:${d.badgeColor}">${d.badge}</div>
      <div class="discount-bubble">-${d.discount}%</div>
      <div class="brand-tag" style="color:${d.brandColor}">${d.brand}</div>
      <div class="card-actions">
        <button class="card-btn save-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave(event,${d.id})">${isSaved ? '♥' : '♡'}</button>
        <button class="card-btn" onclick="share(event,'${d.title}')">↑</button>
      </div>
    </div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-meta">
          <span class="card-tag">${d.tag} · ${d.category}</span>
          <div class="card-title">${d.title}</div>
          <div class="card-desc">${d.description}</div>
        </div>
        ${scoreRingHTML(d.dealScore, d.scoreColor)}
      </div>
      <div class="price-row">
        <span class="price-main">${fmtPrice(d.dealPrice)}</span>
        <span class="price-orig">${fmtPrice(d.originalPrice)}</span>
        <span class="time-left"><span class="time-dot">⏱</span>${d.timeLeft} left</span>
      </div>
      <div class="cta-row">
        <span class="sold-count">🔥 ${d.soldCount}</span>
        <button class="buy-btn" onclick="buyNow(event,'${d.brand}')">Buy Now →</button>
      </div>
    </div>
  </div>`;
}

function render() {
  const container = document.getElementById("cards-container");
  const empty = document.getElementById("empty-state");
  const countEl = document.getElementById("deal-count");
  const filtered = currentFilter === "All" ? deals : deals.filter(d => d.category === currentFilter);
  countEl.textContent = `${filtered.length} deal${filtered.length !== 1 ? 's' : ''} · AI curated`;
  if (filtered.length === 0) {
    container.innerHTML = "";
    empty.classList.remove("hidden");
  } else {
    empty.classList.add("hidden");
    container.innerHTML = filtered.map(cardHTML).join("");
  }
}

function setFilter(el, filter) {
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  currentFilter = filter;
  render();
}

function toggleSave(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  if (saved.has(id)) {
    saved.delete(id);
    btn.classList.remove("saved");
    btn.textContent = "♡";
  } else {
    saved.add(id);
    btn.classList.add("saved");
    btn.textContent = "♥";
    btn.style.transform = "scale(1.3)";
    setTimeout(() => btn.style.transform = "", 200);
  }
}

function share(e, title) {
  e.stopPropagation();
  if (navigator.share) {
    navigator.share({ title: `Loot Deal: ${title}`, text: `Check out this deal on LOOT!`, url: window.location.href });
  } else {
    navigator.clipboard.writeText(`Check out this deal: ${title} on LOOT!`).then(() => alert("Link copied!"));
  }
}

function buyNow(e, brand) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const orig = btn.textContent;
  btn.textContent = "Opening...";
  btn.style.opacity = "0.7";
  setTimeout(() => { btn.textContent = orig; btn.style.opacity = ""; }, 1200);
}

function setNav(btn, id) {
  document.querySelectorAll(".nav-item").forEach(item => {
    item.querySelector(".nav-icon").classList.remove("active");
    item.querySelector(".nav-label").classList.remove("active");
    const dot = item.querySelector(".nav-dot");
    if (dot) dot.remove();
  });
  btn.querySelector(".nav-icon").classList.add("active");
  btn.querySelector(".nav-label").classList.add("active");
  const dot = document.createElement("span");
  dot.className = "nav-dot";
  btn.appendChild(dot);
}

render();
</script>
</body>
</html>
