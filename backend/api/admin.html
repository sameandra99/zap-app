<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zap. — Pipeline Monitor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='90' fill='%23E8571A'>⚡</text></svg>"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#F7F5F2;color:#1C1917;-webkit-font-smoothing:antialiased}
.top{background:#1C1917;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.top h1{font-size:17px;font-weight:800;letter-spacing:-0.3px}
.top h1 span{color:#E8571A}
.dot{width:8px;height:8px;border-radius:50%;background:#2ECC71;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:16px 20px}
.stat{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-val{font-size:28px;font-weight:800;color:#1C1917}
.stat-val.green{color:#16A34A}.stat-val.amber{color:#D97706}.stat-val.red{color:#DC2626}
.stat-label{font-size:11px;color:#A8A29E;margin-top:3px;font-weight:500}
.tabs{display:flex;gap:8px;padding:0 20px 12px;border-bottom:1px solid #EEE;background:#fff}
.tab{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.tab.active-all{background:#1C1917;color:#fff}
.tab.active-posted{background:#16A34A;color:#fff}
.tab.active-filtered{background:#DC2626;color:#fff}
.tab.active-linkops{background:#0369A1;color:#fff}
.tab.active-domains{background:#7C3AED;color:#fff}
.dom-badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
.dom-badge.approved{background:#DCFCE7;color:#15803D}
.dom-badge.pending{background:#FEF3C7;color:#B45309}
.dom-badge.blocked{background:#FEE2E2;color:#B91C1C}
.dom-btn{padding:4px 10px;border-radius:4px;border:none;font-size:11px;font-weight:700;cursor:pointer;margin-right:4px}
.dom-btn.approve{background:#DCFCE7;color:#15803D}
.dom-btn.approve:hover{background:#BBF7D0}
.dom-btn.block{background:#FEE2E2;color:#B91C1C}
.dom-btn.block:hover{background:#FECACA}
.tab:not(.active-all):not(.active-posted):not(.active-filtered){background:#F0EDE8;color:#78716C}
.toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff}
.toolbar input{flex:1;padding:7px 12px;border:1px solid #DDD;border-radius:6px;font-size:13px;font-family:inherit}
.btn-refresh{padding:7px 14px;border-radius:6px;background:#F0EDE8;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-refresh:hover{background:#E5E2DC}
.table-wrap{overflow-x:auto;padding:0 20px 24px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-top:12px}
th{background:#F5F3EF;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#78716C;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #EEE;white-space:nowrap}
td{padding:6px 10px;font-size:12px;border-bottom:1px solid #F5F3EF;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8;transition:background 0.15s ease}
.badge{display:inline-block;padding:3px 6px;border-radius:6px;font-size:10px;font-weight:700;text-align:center;line-height:1.1;white-space:normal}
.badge.auto-posted{background:#DCFCE7;color:#15803D}
.badge.filtered{background:#FEE2E2;color:#B91C1C}
.badge.admin-approved{background:#E0F2FE;color:#0369A1}
.channel{font-size:11px;background:#F0EDE8;padding:3px 8px;border-radius:4px;color:#78716C;font-weight:500;white-space:nowrap;display:inline-block}
.raw-text{min-width:200px;max-width:400px;max-height:40px;overflow:hidden;color:#78716C;font-size:11px;cursor:pointer;line-height:1.3;word-break:break-word;text-align:left}
.raw-text:hover{color:#1C1917}
.raw-text.empty{cursor:default;color:#C9B8B3}
.copy-text{min-width:180px;max-width:280px;font-size:12px;color:#1C1917;font-weight:500;line-height:1.3;text-align:left;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.reason{min-width:140px;max-width:200px;font-size:12px;color:#B91C1C;line-height:1.3;text-align:left;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.img-thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;background:#F0EDE8}
.img-placeholder{width:40px;height:40px;border-radius:4px;background:#F0EDE8;display:flex;align-items:center;justify-content:center;font-size:16px}
.img-cell{text-align:center}
.img-source{font-size:9px;color:#A8A29E;margin-top:2px;text-align:center;font-weight:500}
.time-cell{font-size:11px;color:#A8A29E;white-space:nowrap}
.cta-link{font-size:12px;font-weight:600;color:#fff;text-decoration:none;padding:4px 8px;border-radius:4px;background:#0369A1;display:inline-block;white-space:nowrap}
.cta-link:hover{background:#0284C7}
.cta-empty{font-size:11px;color:#C9B8B3}
.actions{display:flex;gap:4px;white-space:nowrap}
.btn-approve{padding:4px 10px;border-radius:4px;background:#DCFCE7;color:#15803D;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s ease}
.btn-approve:hover{background:#BBF7D0}
.btn-edit{padding:4px 10px;border-radius:4px;background:#E0F2FE;color:#0369A1;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s ease}
.btn-edit:hover{background:#BAE6FD}
.btn-remove{padding:4px 10px;border-radius:4px;background:#FEE2E2;color:#B91C1C;border:none;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background 0.15s ease}
.btn-remove:hover{background:#FECACA}
.empty{text-align:center;padding:40px;color:#A8A29E}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.modal label{font-size:12px;font-weight:600;color:#78716C;display:block;margin-bottom:4px}
.modal textarea,.modal input[type=text]{width:100%;padding:8px 10px;border:1px solid #DDD;border-radius:6px;font-size:13px;font-family:inherit;resize:vertical;margin-bottom:12px}
.modal textarea{min-height:80px}
.modal-img-preview{width:80px;height:80px;object-fit:cover;border-radius:6px;margin-bottom:8px;display:none}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.btn-save{padding:8px 18px;border-radius:6px;background:#1C1917;color:#fff;border:none;font-weight:700;font-size:13px;cursor:pointer}
.btn-cancel{padding:8px 18px;border-radius:6px;background:#F0EDE8;color:#1C1917;border:none;font-weight:700;font-size:13px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1C1917;color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}
.raw-text-modal{max-height:200px;overflow-y:auto;padding:8px;border:1px solid #EEE;border-radius:6px;background:#F7F5F2;font-size:11px;white-space:pre-wrap;word-break:break-word;font-family:monospace}

/* Link Ops Tab */
.url-cell{display:block;padding:4px 7px;border-radius:4px;font-size:11px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;cursor:pointer}
.url-cell.raw{background:#F0EDE8;color:#78716C}
.url-cell.affiliate{background:#DCFCE7;color:#15803D}
.url-cell.zap{background:#E0F2FE;color:#0369A1}
.url-cell.empty{background:#F9F9F9;color:#C9B8B3;cursor:default}
</style>
</head>
<body>

<div class="top">
  <h1>Zap<span>.</span> Pipeline Monitor</h1>
  <div style="font-size:12px;color:#A8A29E"><span class="dot"></span>Live</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-label">Deals posted</div></div>
  <div class="stat"><div class="stat-val green" id="s-today">—</div><div class="stat-label">Posted today</div></div>
  <div class="stat"><div class="stat-val amber" id="s-logged">—</div><div class="stat-label">Pipeline logs</div></div>
  <div class="stat"><div class="stat-val red" id="s-filtered">—</div><div class="stat-label">Filtered out</div></div>
  <div class="stat"><div class="stat-val" id="s-clicks">—</div><div class="stat-label">Total clicks</div></div>
</div>

<div class="tabs" style="background:#F7F5F2;border:none">
  <button class="tab active-all" onclick="setTab('all',this)">All</button>
  <button class="tab" onclick="setTab('posted',this)">✅ Posted</button>
  <button class="tab" onclick="setTab('filtered',this)">❌ Filtered</button>
  <button class="tab" onclick="setTab('linkops',this)">🔗 Link Ops</button>
  <button class="tab" onclick="setTab('domains',this)">🌐 Domains <span id="pendingDot" style="display:none;background:#DC2626;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px"></span></button>
</div>
<div class="toolbar">
  <input type="text" id="search" placeholder="Search deals, channels, reasons..." oninput="render()"/>
  <button class="btn-refresh" onclick="load()">↺ Refresh</button>
</div>

<div class="table-wrap">
  <div id="content" class="empty">Loading...</div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3 id="modalTitle">Edit Deal</h3>
    <input type="hidden" id="modalDealId"/>
    <input type="hidden" id="modalLogIndex"/>
    <input type="hidden" id="modalMode"/>

    <label>Copy</label>
    <textarea id="modalCopy" rows="3"></textarea>

    <label>Image URL</label>
    <input type="text" id="modalImageUrl" placeholder="https://..." oninput="previewImg()"/>
    <img id="modalImgPreview" class="modal-img-preview"/>

    <label style="margin-top:16px">Raw Telegram Message</label>
    <div id="modalRawDisplay" class="raw-text-modal"></div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save & Post</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let activeTab = 'all';
let allLogs = [];
let allDeals = [];
let allLinkOps = [];
let allDomains = [];

async function load(showSpinner = true) {
  if (showSpinner) document.getElementById('content').innerHTML = '<div class="empty">Loading...</div>';
  const [logsRes, dealsRes, linkOpsRes, domainsRes] = await Promise.all([
    fetch('/admin/logs?limit=300').then(r=>r.json()).catch(()=>({logs:[]})),  // Live logs only
    fetch('/admin/deals?limit=300').then(r=>r.json()).catch(()=>({deals:[]})),
    fetch('/admin/link-ops?limit=300').then(r=>r.json()).catch(()=>({operations:[]})),
    fetch('/admin/redirect-domains').then(r=>r.json()).catch(()=>({domains:[]})),
  ]);
  allLogs = logsRes.logs || [];
  allDeals = dealsRes.deals || [];
  allLinkOps = linkOpsRes.operations || [];
  allDomains = domainsRes.domains || [];

  // Pending-domain alert dot on the Domains tab
  const pendingCount = allDomains.filter(d => d.status === 'pending').length;
  const dot = document.getElementById('pendingDot');
  if (dot) {
    if (pendingCount > 0) { dot.style.display = 'inline-block'; dot.textContent = pendingCount; }
    else { dot.style.display = 'none'; }
  }

  const today = new Date().toISOString().split('T')[0];
  const todayDeals = allDeals.filter(d => d.created_at?.startsWith(today));
  const totalClicks = allDeals.reduce((s,d)=>s+(d.clicks||0),0);
  const filtered = allLogs.filter(l => !l.is_valid).length;

  document.getElementById('s-total').textContent = allDeals.length;
  document.getElementById('s-today').textContent = todayDeals.length;
  document.getElementById('s-logged').textContent = allLogs.length;
  document.getElementById('s-filtered').textContent = filtered;
  document.getElementById('s-clicks').textContent = totalClicks >= 1000 ? (totalClicks/1000).toFixed(1)+'K' : totalClicks;

  render();
}

function setTab(t, btn) {
  activeTab = t;
  document.querySelectorAll('.tab').forEach(b => b.className = 'tab');
  btn.className = `tab active-${t}`;
  render();
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-IN', {timeZone:'Asia/Kolkata', month:'short', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:true}).replace(',','');
}

function getImageSource(raw, imageUrl) {
  if (!imageUrl) return 'none';
  if (imageUrl.includes('deal-images')) return raw ? 'telegram' : 'scraped';
  if (imageUrl.includes('amazon')) return 'amazon-cdn';
  if (imageUrl.includes('media-amazon')) return 'amazon-cdn';
  if (imageUrl.includes('myntra')) return 'myntra';
  if (imageUrl.includes('ajio')) return 'ajio';
  if (imageUrl.includes('flipkart')) return 'flipkart';
  return 'other';
}

function render() {
  const q = (document.getElementById('search')?.value || '').toLowerCase();

  // Special case for Link Ops tab
  if (activeTab === 'linkops') {
    return renderLinkOps(q);
  }
  // Special case for Domains tab
  if (activeTab === 'domains') {
    return renderDomains(q);
  }

  let items = [];

  if (activeTab === 'posted') {
    items = allDeals.map(d => ({type:'deal', ...d}));
  } else if (activeTab === 'filtered') {
    items = allLogs.filter(l => !l.is_valid && !l.admin_approved);
  } else {
    const logDealIds = new Set(allLogs.filter(l=>l.is_valid).map(l=>l.deal_id));
    items = [
      ...allLogs,
      ...allDeals.filter(d => !logDealIds.has(d.id)).map(d => ({
        type:'deal', is_valid:true, copy:d.copy, source_channel:d.source_channel,
        created_at:d.created_at, deal_id:d.id, image_url:d.image_url,
        llm_decision:{platform:d.platform, url:d.affiliate_url}
      }))
    ];
  }

  if (q) {
    items = items.filter(l =>
      (l.raw_text||'').toLowerCase().includes(q) ||
      (l.copy||l.llm_decision?.copy||'').toLowerCase().includes(q) ||
      (l.source_channel||'').toLowerCase().includes(q) ||
      (l.filter_reason||'').toLowerCase().includes(q)
    );
  }

  // Sort by message time (newest first) regardless of status
  items.sort((a, b) => {
    const aTime = new Date(a.timestamp_fetched || a.created_at || 0);
    const bTime = new Date(b.timestamp_fetched || b.created_at || 0);
    return bTime - aTime; // Descending (newest first)
  });

  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No results.</div>';
    return;
  }

  document.getElementById('content').innerHTML = `
    <table>
      <thead><tr>
        <th>Approval</th>
        <th>Msg Time</th>
        <th>Raw Message</th>
        <th>Channel</th>
        <th>Copy</th>
        <th>Reason</th>
        <th>CTA</th>
        <th>Image</th>
        <th>Src</th>
        <th>Posted</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${items.map((l, i) => {
          const msgTime = fmtTime(l.timestamp_fetched || l.created_at);
          const postedTime = fmtTime(l.created_at);
          const copy = l.copy || l.llm_decision?.copy || '';
          const reason = l.filter_reason || l.llm_decision?.reason || '';
          const raw = l.raw_text || '';
          const ch = l.source_channel || '—';
          const imgUrl = l.image_url || '';
          const imgSrc = getImageSource(raw, imgUrl);
          const dealId = l.deal_id || l.id || '';
          const isApproved = l.admin_approved;
          const isPosted = l.is_valid || l.type === 'deal';
          const platform = l.llm_decision?.platform || l.platform || '';
          const url = l.llm_decision?.url || l.affiliate_url || '';

          const imgCell = imgUrl
            ? `<div class="img-cell"><img class="img-thumb" src="${esc(imgUrl)}" onerror="this.style.display='none'"/></div>`
            : `<div class="img-cell"><div class="img-placeholder">🛍</div></div>`;

          const actions = isPosted || isApproved
            ? `<div class="actions">
                <button class="btn-edit" onclick="openEdit('${esc(dealId)}', -1, ${JSON.stringify(copy).replace(/"/g,'&quot;')}, ${JSON.stringify(imgUrl).replace(/"/g,'&quot;')}, ${JSON.stringify(raw).replace(/"/g,'&quot;')})">✏️ Edit</button>
                <button class="btn-remove" onclick="removeDeal('${esc(dealId)}')">🗑 Remove</button>
               </div>`
            : `<div class="actions">
                <button class="btn-approve" onclick="generateAndApprove(${i}, ${JSON.stringify(raw).replace(/"/g,'&quot;')})">✓ Approve Deal</button>
               </div>`;

          const badge = isApproved
            ? `<span class="badge admin-approved">✔ Admin<br/>Approved</span>`
            : isPosted
            ? `<span class="badge auto-posted">✅ Auto<br/>Posted</span>`
            : `<span class="badge filtered">❌ Filtered</span>`;

          const ctaBtn = url
            ? `<a href="${esc(url)}" target="_blank" class="cta-link">${esc(platform || 'Link')} →</a>`
            : `<span class="cta-empty">—</span>`;

          return `<tr>
            <td>${badge}</td>
            <td><span class="time-cell">${msgTime}</span></td>
            <td><div class="raw-text${!raw ? ' empty' : ''}" ${raw ? `title="${esc(raw)}" onclick="showRaw('${esc(raw).replace(/'/g,"\\'")}')"` : ''}>${raw ? esc(raw).substring(0,80) : '—'}</div></td>
            <td><span class="channel">${esc(ch)}</span></td>
            <td><div class="copy-text">${copy ? esc(copy.substring(0,80)) : '—'}</div></td>
            <td><div class="reason">${reason ? esc(reason.substring(0,80)) : '—'}</div></td>
            <td>${ctaBtn}</td>
            <td>${imgCell}</td>
            <td><span class="time-cell">${imgSrc}</span></td>
            <td><span class="time-cell">${postedTime}</span></td>
            <td>${actions}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function renderLinkOps(q) {
  let items = allLinkOps;

  // Filter by search query
  if (q) {
    items = items.filter(op =>
      (op.short_urls || []).some(u => u.includes(q)) ||
      (op.direct_urls || []).some(u => u.includes(q)) ||
      (op.affiliate_url || '').includes(q) ||
      (op.channel || '').toLowerCase().includes(q) ||
      (op.platform || '').toLowerCase().includes(q)
    );
  }

  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No URL transformations found.</div>';
    return;
  }

  document.getElementById('content').innerHTML = `
    <table>
      <thead><tr>
        <th>Time</th>
        <th>Channel</th>
        <th>Platform</th>
        <th>Copy</th>
        <th>Raw URL <span style="font-weight:400;color:#A8A29E">(from message)</span></th>
        <th>Affiliate URL <span style="font-weight:400;color:#A8A29E">(with tracking)</span></th>
        <th>Zap Deal URL <span style="font-weight:400;color:#A8A29E">(clean)</span></th>
      </tr></thead>
      <tbody>
        ${items.map(op => {
          const timestamp = fmtTime(op.timestamp);
          const channel = op.channel || '—';
          const platform = op.platform || 'unknown';
          const copy = op.copy || '—';

          const rawHtml = (op.raw_urls || []).length
            ? op.raw_urls.map(u => '<a href="' + esc(u) + '" target="_blank" class="url-cell raw" title="' + esc(u) + '">' + esc(u.substring(0, 45)) + '</a>').join('')
            : '<span class="url-cell empty">—</span>';

          const affiliateHtml = op.affiliate_url
            ? '<a href="' + esc(op.affiliate_url) + '" target="_blank" class="url-cell affiliate" title="' + esc(op.affiliate_url) + '">' + esc(op.affiliate_url.substring(0, 45)) + '</a>'
            : '<span class="url-cell empty">—</span>';

          const zapHtml = op.zap_deal_url
            ? '<a href="' + esc(op.zap_deal_url) + '" target="_blank" class="url-cell zap" title="' + esc(op.zap_deal_url) + '">' + esc(op.zap_deal_url.substring(0, 45)) + '</a>'
            : '<span class="url-cell empty">—</span>';

          return '<tr>'
            + '<td><span class="time-cell">' + timestamp + '</span></td>'
            + '<td><span class="channel">' + esc(channel) + '</span></td>'
            + '<td><span style="font-size:11px;font-weight:600">' + esc(platform) + '</span></td>'
            + '<td><div class="copy-text">' + esc(copy) + '</div></td>'
            + '<td>' + rawHtml + '</td>'
            + '<td>' + affiliateHtml + '</td>'
            + '<td>' + zapHtml + '</td>'
            + '</tr>';
        }).join('')}
      </tbody>
    </table>`;
}

function renderDomains(q) {
  let items = allDomains;
  if (q) items = items.filter(d => (d.domain || '').toLowerCase().includes(q) || (d.status || '').includes(q));

  // Sort: pending first (need attention), then approved, then blocked
  const order = { pending: 0, approved: 1, blocked: 2 };
  items = [...items].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9) || (b.seen_count || 0) - (a.seen_count || 0));

  const pending = items.filter(d => d.status === 'pending');
  const banner = pending.length
    ? '<div style="background:#FEF3C7;color:#B45309;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:600">⚠️ ' + pending.length + ' new redirect domain(s) awaiting your approval. Deals routed through them are held until you approve.</div>'
    : '';

  if (!items.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No redirect domains yet. They appear here as channels use new trackers.</div>';
    return;
  }

  document.getElementById('content').innerHTML = banner + `
    <table>
      <thead><tr>
        <th>Domain</th>
        <th>Status</th>
        <th>Times Seen</th>
        <th>Sample URL</th>
        <th>First Seen</th>
        <th>Actions</th>
      </tr></thead>
      <tbody>
        ${items.map(d => {
          const status = d.status || 'pending';
          const sample = d.sample_url || '—';
          const firstSeen = d.first_seen ? fmtTime(d.first_seen) : '—';
          const badge = '<span class="dom-badge ' + status + '">' + status + '</span>';

          let actions = '';
          if (status === 'pending') {
            actions = '<button class="dom-btn approve" onclick="setDomain(\'' + esc(d.domain) + '\',\'approved\')">✓ Approve</button>'
                    + '<button class="dom-btn block" onclick="setDomain(\'' + esc(d.domain) + '\',\'blocked\')">✕ Block</button>';
          } else if (status === 'approved') {
            actions = '<button class="dom-btn block" onclick="setDomain(\'' + esc(d.domain) + '\',\'blocked\')">✕ Block</button>';
          } else {
            actions = '<button class="dom-btn approve" onclick="setDomain(\'' + esc(d.domain) + '\',\'approved\')">✓ Approve</button>';
          }

          return '<tr>'
            + '<td><span style="font-family:monospace;font-weight:600;font-size:12px">' + esc(d.domain) + '</span></td>'
            + '<td>' + badge + '</td>'
            + '<td>' + (d.seen_count || 1) + '</td>'
            + '<td><span style="font-family:monospace;font-size:11px;color:#78716C">' + esc(sample.substring(0, 50)) + '</span></td>'
            + '<td><span class="time-cell">' + firstSeen + '</span></td>'
            + '<td>' + actions + '</td>'
            + '</tr>';
        }).join('')}
      </tbody>
    </table>`;
}

async function setDomain(domain, status) {
  showToast('Updating ' + domain + '...');
  try {
    const res = await fetch('/admin/redirect-domains/' + encodeURIComponent(domain), {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status}),
    });
    if (res.ok) {
      showToast('✅ ' + domain + ' → ' + status);
      // Update local copy and re-render
      const d = allDomains.find(x => x.domain === domain);
      if (d) d.status = status;
      const pendingCount = allDomains.filter(x => x.status === 'pending').length;
      const dot = document.getElementById('pendingDot');
      if (dot) { if (pendingCount > 0) { dot.style.display='inline-block'; dot.textContent=pendingCount; } else dot.style.display='none'; }
      render();
    } else {
      showToast('❌ Failed to update');
    }
  } catch (e) {
    showToast('❌ Error: ' + e.message);
  }
}

async function generateAndApprove(logIndex, raw) {
  showToast('🤖 Generating copy and image...');
  console.log('[GENERATE] Starting with logIndex:', logIndex, 'raw:', raw.substring(0, 50));

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 45000); // 45 second timeout

    const response = await fetch('/admin/generate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({log_index: logIndex, raw_text: raw}),
      signal: controller.signal
    });

    clearTimeout(timeout);

    console.log('[GENERATE] Response status:', response.status);

    if (!response.ok) {
      showToast('❌ Server error: ' + response.status);
      openEdit('', logIndex, '', '', raw);
      return;
    }

    const result = await response.json();
    console.log('[GENERATE] Response:', result);

    if (result.status === 'generated') {
      console.log('[GENERATE] Success! Copy length:', result.copy.length, 'Image:', !!result.image_url);
      document.getElementById('modalDealId').value = '';
      document.getElementById('modalLogIndex').value = logIndex;
      document.getElementById('modalMode').value = 'approve';
      document.getElementById('modalTitle').textContent = '✨ Auto-Generated - Review & Save';
      document.getElementById('modalCopy').value = result.copy || '';
      document.getElementById('modalImageUrl').value = result.image_url || '';
      document.getElementById('modalRawDisplay').textContent = raw;
      previewImg();
      document.getElementById('editModal').classList.add('open');
      showToast('✅ Copy & image generated!');
    } else {
      console.log('[GENERATE] Failed with status:', result.status, 'message:', result.message);
      showToast('⚠️ ' + (result.message || 'Generation failed'));
      openEdit('', logIndex, '', '', raw);
    }
  } catch (e) {
    console.error('[GENERATE] Exception:', e);
    showToast('❌ Error: ' + e.message);
    openEdit('', logIndex, '', '', raw);
  }
}

function openEdit(dealId, logIndex, copy, imageUrl, raw) {
  document.getElementById('modalDealId').value = dealId;
  document.getElementById('modalLogIndex').value = logIndex;
  document.getElementById('modalMode').value = dealId ? 'edit' : 'approve';
  document.getElementById('modalTitle').textContent = dealId ? 'Edit Deal' : 'Approve & Edit';
  document.getElementById('modalCopy').value = copy;
  document.getElementById('modalImageUrl').value = imageUrl;
  document.getElementById('modalRawDisplay').textContent = raw;
  previewImg();
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

function previewImg() {
  const url = document.getElementById('modalImageUrl').value;
  const img = document.getElementById('modalImgPreview');
  if (url) { img.src = url; img.style.display = 'block'; }
  else { img.style.display = 'none'; }
}

async function saveModal() {
  const dealId = document.getElementById('modalDealId').value;
  const logIndex = parseInt(document.getElementById('modalLogIndex').value);
  const mode = document.getElementById('modalMode').value;
  const copy = document.getElementById('modalCopy').value;
  const imageUrl = document.getElementById('modalImageUrl').value;

  if (mode === 'edit' && dealId) {
    await fetch(`/admin/deals/${encodeURIComponent(dealId)}`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({copy, image_url: imageUrl})
    });
    showToast('Deal updated ✅');
  } else {
    await fetch('/admin/approve', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({log_index: logIndex, copy, image_url: imageUrl})
    });
    showToast('Deal approved & posted ✅');
  }
  closeModal();
  await load();
}

async function removeDeal(dealId) {
  if (!confirm('Remove this deal from the app?')) return;
  await fetch(`/admin/deals/${encodeURIComponent(dealId)}`, {method:'DELETE'});
  showToast('Deal removed 🗑');
  await load();
}

function showRaw(full) {
  document.getElementById('modalRawDisplay').textContent = full;
  document.getElementById('editModal').classList.add('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();

// Background refresh every 60s — silently updates data + stats without
// re-rendering the visible content (no spinner, no scroll jump).
// Only re-renders if user is on a tab that shows live counts (all/posted/filtered).
setInterval(async () => {
  await load(false);  // fetch fresh data, no spinner
  // Re-render current view only if not link-ops or domains (those are static enough)
  if (activeTab !== 'linkops' && activeTab !== 'domains') {
    render(document.getElementById('search').value.toLowerCase().trim());
  }
}, 60000);
</script>
</body>
</html>
