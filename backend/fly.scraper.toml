app = "loot-scraper"
primary_region = "bom"  # Mumbai

[build]

# Background worker — keep always running
[machines]
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[processes]
  app = "python scraper/telegram_scraper.py"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "loot_session_data"
  destination = "/data"
